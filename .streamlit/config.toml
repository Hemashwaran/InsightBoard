[theme]
primaryColor = "#6C63FF"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1A1D23"
textColor = "#FAFAFA"
font = "sans serif"

[server]
maxUploadSize = 200
headless = true
enableWebsocketCompression = true
enableCORS = false

[runner]
# Prevent the worker from running out of memory by disabling
# magic command scanning on large scripts.
magicEnabled = false
